<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>Move4U — Removals & Moving Service in London | Man and Van</title>
    <meta
      name="description"
      content="Move4U — trusted London removals and moving service. Man and van, house & flat moves, furniture delivery, waste removal and international moving. Fast, fair pricing, fully insured. Book online in minutes."
    />
    <meta name="keywords" content="Move4U, removals London, moving service London, man and van London, house removals, flat moves, furniture delivery, waste removal, international moving" />
    <meta name="author" content="Move4U" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="theme-color" content="#3D1289" />

    <!-- Canonical (apex domain is the source of truth) -->
    <link rel="canonical" href="https://move4u.uk/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Move4U" />
    <meta property="og:url" content="https://move4u.uk/" />
    <meta property="og:title" content="Move4U — Removals & Moving Service in London" />
    <meta property="og:description" content="London removals and man-and-van moving service. House moves, furniture delivery, waste removal and international moving. Book online in minutes." />
    <meta property="og:image" content="https://move4u.uk/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Move4U — Removals & Moving Service in London" />
    <meta name="twitter:description" content="London removals and man-and-van moving service. House moves, furniture delivery, waste removal and international moving." />
    <meta name="twitter:image" content="https://move4u.uk/opengraph.jpg" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/m4u-icon.png" />
    <link rel="apple-touch-icon" href="/m4u-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Structured data: LocalBusiness / MovingCompany. Helps Google
         build a rich result for the brand "Move4U" and surface contact
         details, opening hours, and service area. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MovingCompany",
      "name": "Move4U",
      "alternateName": "Move4U Removals",
      "url": "https://move4u.uk/",
      "logo": "https://move4u.uk/move4u-logo.png",
      "image": "https://move4u.uk/opengraph.jpg",
      "description": "London removals and moving service. Man and van, house and flat moves, furniture delivery, waste removal and international moving.",
      "email": "move4u.uk@gmail.com",
      "areaServed": [
        { "@type": "City", "name": "London" },
        { "@type": "Country", "name": "United Kingdom" }
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "London",
        "addressCountry": "GB"
      },
      "priceRange": "££",
      "openingHours": "Mo-Su 07:00-22:00",
      "sameAs": [
        "https://t.me/move4u_uk"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
